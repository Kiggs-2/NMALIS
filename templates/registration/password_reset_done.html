{% extends "base.html" %}
{% block body_class %}auth-page{% endblock %}
{% block title %}Reset email sent{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center py-5">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 p-lg-5 text-center">
        <h1 class="h4 mb-3">Check your email</h1>
        <p class="text-muted mb-4">If an account with that email exists, we've sent a password reset link. You should receive it shortly.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">Return to sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
